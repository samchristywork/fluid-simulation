<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #aaa;
    }
    canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
    }
    #controls {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #info {
      font-size: 12px;
      opacity: 0.6;
    }
    #recordBtn {
      font-family: monospace;
      font-size: 12px;
      background: #222;
      color: #aaa;
      border: 1px solid #444;
      padding: 4px 10px;
      cursor: pointer;
    }
    #recordBtn:hover { border-color: #888; }
    #recordBtn.recording { color: #f55; border-color: #f55; }
    #recordBtn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
  <div id="info">click & drag to add fluid · mouse movement adds velocity</div>
  <button id="recordBtn">&#9679; Record GIF</button>
</div>
</body>
</html>
